<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>StoreTek</title>
  </head>
  <body>
    <header>
      <h1 id="logo">StoreTek</h1>
      <div class="search-container">
        <input type="text" id="search-input" placeholder="Buscar produto..." />

        <select id="filtro-categoria">
          <option value="todas">Todas</option>
          <option value="hardware">Hardware</option>
          <option value="eletronico">Eletronico</option>
          <option value="periferico">Periferico</option>
        </select>
      </div>
    </header>

    <div class="layout">
      <div class="produtos">
        <h2>Produtos</h2>
        <div id="lista-produtos"></div>
      </div>

      <div class="carrinho">
        <h2>Carrinho <span id="contador-carrinho"></span></h2>
        <div id="lista-carrinho"></div>
        <h3>Total: <span id="total">0</span></h3>
        <button id="btnFinalizar">Finalizar compra</button>
      </div>
    </div>

    <div id="modal-produto" class="modal hidden">
      <div class="modal-content">
        <span id="fechar-modal" class="close">&times;</span>
        <h3 id="modal-nome"></h3>
        <p id="modal-preco"></p>
        <p id="modal-estoque"></p>
        <p id="modal-categoria"></p>
        <button id="modal-add-carrinho" class="btnsCart">
          Adicionar ao carrinho
        </button>
      </div>
    </div>

    <div class="historico">
      <h2>Histórico de Pedidos</h2>
      <div id="lista-pedidos"></div>
    </div>

    

    <script type="module" src="js/app.js"></script>
  </body>
</html>
